
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ING Bank · Executive Card</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
background:linear-gradient(135deg,#eef2f7,#dfe6ee);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:420px;
background:white;
border-radius:28px;
padding:32px;
box-shadow:
0 40px 80px rgba(0,0,0,0.15),
0 10px 20px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #ff6600;
padding-bottom:14px;
margin-bottom:22px;
}

.bank{
font-size:26px;
font-weight:700;
color:#0b1a2a;
}

.bank span{
font-weight:400;
color:#6b7c8f;
}

.badge{
font-size:12px;
color:#ff6600;
border:1px solid #ff6600;
border-radius:20px;
padding:4px 10px;
}

.name{
font-size:30px;
font-weight:600;
margin-bottom:6px;
}

.pinyin{
color:#5a6b7c;
font-size:18px;
margin-bottom:10px;
}

.title{
display:inline-block;
background:#ff6600;
color:white;
padding:6px 16px;
border-radius:30px;
font-size:14px;
margin-bottom:20px;
}

.info{
margin-top:10px;
}

.item{
margin-bottom:8px;
font-size:16px;
color:#1e2f40;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:10px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:500;
}

.call{background:#ff6600;color:white}
.mail{background:#eef2f7}
.map{background:#eef2f7}

.qr{
margin-top:26px;
text-align:center;
}

.qr p{
font-size:12px;
color:#7d8fa1;
margin-top:8px;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
<div class="bank">ING <span>Bank N.V.</span></div>
<div class="badge">Executive</div>
</div>

<div class="name">张蒙</div>
<div class="pinyin">Zhang Meng</div>
<div class="title">Vice President</div>

<div class="info">
<div class="item">📱 +852 9245 0065</div>
<div class="item">✉️ zhang.meng@ing.com</div>
<div class="item">🏢 8th Floor, Three Pacific Place</div>
<div class="item">1 Queen's Road East · Hong Kong</div>
</div>

<div class="buttons">
<button class="btn call" onclick="location.href='tel:+85292450065'">Call</button>
<button class="btn mail" onclick="location.href='mailto:zhang.meng@ing.com'">Email</button>
<button class="btn map" onclick="window.open('https://maps.google.com/?q=Three+Pacific+Place+Hong+Kong')">Map</button>
</div>

<div class="qr">
<div id="qrcode"></div>
<p>Scan to save contact</p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>
var vcard=`BEGIN:VCARD
VERSION:3.0
FN:Zhang Meng
N:Meng;Zhang;;;
ORG:ING Bank N.V.
TITLE:Vice President
TEL:+85292450065
EMAIL:zhang.meng@ing.com
ADR:;;8th Floor, Three Pacific Place, 1 Queen's Road East;;;Hong Kong;
END:VCARD`;

new QRCode(document.getElementById("qrcode"),{
text:vcard,
width:160,
height:160
});
</script>

</body>
</html>
